<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camp.in - Cadastro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="login-container">
      <!-- Lado Esquerdo: Formulário -->
      <section class="form-section">
        <header>
          <img src="assets/logo.svg" alt="Camp.in Logo" class="logo" />
        </header>

        <div class="form-wrapper">
          <div class="title-group">
            <img src="assets/log-in.svg" alt="" />
            <h1>Crie sua conta</h1>
          </div>
          <p>Preencha os dados abaixo para se cadastrar.</p>

          <form id="register-form">
            <div class="input-group">
              <label for="email">E-mail</label>
              <div class="input-field">
                <img src="assets/mail.svg" alt="" />
                <input
                  type="email"
                  id="email"
                  placeholder="Digite seu e-mail"
                  required
                />
              </div>
            </div>

            <div class="input-group">
              <label for="password">Senha</label>
              <div class="input-field">
                <img src="assets/lock.svg" alt="" />
                <input
                  type="password"
                  id="password"
                  placeholder="Crie uma senha (mín. 6 caracteres)"
                  required
                />
                <button type="button" id="toggle-password">
                  <img src="assets/eye.svg" alt="Mostrar senha" />
                </button>
              </div>
            </div>

            <button type="submit" class="btn-primary">CADASTRAR</button>
          </form>

          <footer>Já tem uma conta? <a href="index.html">Faça login</a></footer>
        </div>
      </section>

      <!-- Lado Direito: Imagem -->
      <section class="image-section"></section>
    </main>

    <script type="module" src="register.js"></script>
  </body>
</html>
